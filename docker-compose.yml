name: lynkoo

services:
  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command:
      - python
      - -m
      - uvicorn
      - app.backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8800"
      - --reload
      - --reload-dir
      - /app/app
      - --reload-dir
      - /app/spotdl
    environment:
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
      LYNKOO_OUTPUT_DIR: /downloads
    ports:
      - "8800:8800"
    volumes:
      - .:/app
      - ./downloads:/downloads
      - backend-cache:/root/.cache

  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_PROXY_TARGET: http://backend:8800
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5174:5173"
    volumes:
      - .:/app
      - frontend-node-modules:/app/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  backend-cache:
  frontend-node-modules:
